kind = "web"
previewPath = "/"
title = "Dental Clinic Landing Page"
version = "1.0.0"
id = "artifacts/dental-clinic"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23961

[services.development]
run = "pnpm --filter @workspace/dental-clinic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dental-clinic", "run", "build" ]
serve = "static"
publicDir = "artifacts/dental-clinic/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23961"
BASE_PATH = "/"
